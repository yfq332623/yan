<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>颜凡棋的个人主页 - WebServer 实战</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
        }
        h1 { color: #003366; margin-bottom: 0.5rem; } /* 复旦蓝调性 */
        p { line-height: 1.6; color: #666; }
        .stats {
            margin-top: 1.5rem;
            padding: 10px;
            background: #eef2f3;
            border-radius: 8px;
            font-weight: bold;
            color: #007bff;
        }
        .tag {
            display: inline-block;
            background: #003366;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="tag">复旦大学 · 本科生</div>
        <h1>你好，我是颜凡棋</h1>
        <p>目前就读于复旦大学大二年级。这是我基于 C++ 高性能编程实现的轻量级 Web 服务器。</p>
        <p>本项目涵盖了 <b>Epoll ET 模式</b>、<b>线程池调度</b> 以及 <b>数据库连接池</b> 等核心技术。</p>
        
        <div class="stats">
            你是第 {{COUNT}} 位访问本服务器的访客
        </div>
        
        <p style="font-size: 0.7rem; margin-top: 2rem; color: #ccc;">
            Powered by Fanqi's Custom C++ WebServer
        </p>
    </div>
</body>
</html>
